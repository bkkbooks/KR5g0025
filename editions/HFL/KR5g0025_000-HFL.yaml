front:
  text: 太上正一延生保命籙物六據某郷貫居位奉道信士某詞稱本命某年月日時建生上屬北斗某星君注照言念某素以太上高皇帝王神氣在身不能自分别詣道自實言被
  hash: sha256:fa3976deacfb2ea92f86e8406776136f5c5d11b1a6f2afb4c56eb99ef97740b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0025_HFL_000-001a, image: hfl/0880/0880-004.png}
body:
  text: 三炁君召即日謹齎法信叩頭恭詣龍虎山嗣漢天師眞人門下拜受太上正一延生保命祕籙一階修身鍊己保命護身過度千災驅除萬惡延年益算學道成眞有違科約坐見中傷伏願大道元恩錫垂祐助添神益算眞炁流通慶及群生七祖九曾俱蒙開度行符勑水救病扶危先人後己施無望報成功不宰如此之行道將立見急急依遵太上正一元降律令太上老君於无上三天與十方大聖至眞尊神長生保命護身天尊領諸得道神仙眞仙飛仙及慈悲度厄眞人尋聲救苦眞人濟生度死眞人萬福護身眞人歷觀世界見諸男女各遭三災九厄十苦八難遇殃值禍無方解謝沈墜三塗漂諸六趣永没地獄天尊觀見憫念群生教以謝愆之法濟生度死得離罪苦若有男女横被六天疫毒水火盜賊蛇虎魑魅惡人咒詛復連殃注五土尅病皆當闔家齊心修齋安置壇場香花燈燭請三洞道士焚香行道誦經佩籙如法修行諸災横難永得解脫十直八節三元本命父母降生之日修齋佩籙保安家着即得降大神力保命護身若元辰六害十惡修齋佩籙即得除災滅厄保命護身若父母夫妻亡殁修齋佩籙心願生天即得拔亡度厄保護人身若元辰六害死氣之厄修齊佩籙即得解害滅妖無災無難無罪不禳保命護身永得清淨東方青騎天官兵馬九億萬人東方保命護身金剛力士九億萬人南方赤騎天官兵馬三億萬人南方保命護身金剛力士三億萬人西方白騎天官兵馬七億萬人西方保命護身金剛力士七億萬人北方黑騎天官兵馬五億萬人北方保命護身金剛力士五億萬人中央黄騎天官兵馬十二億萬人中央保命護身天騶甲卒十二億萬人十方保命兵士千億萬人十方護身兵士千億萬人十方解害兵士千億萬人十方除病兵士千億萬人十方消災兵士千億萬人十方護命兵士千億萬人十方滅考兵士千億萬人十方斬瘟兵士千億萬人十方滅毒兵士千億萬人十方解誓兵士千億萬人十方治癎兵士千億萬人十方斬妖兵士千億萬人十方助法兵士千億萬人十方護經力士千億萬人天靈官監生使者三人天靈官保命使者三人天靈官長生使者三人天靈官扁鵲太醫三人天靈官除黑簿吏三人天靈官東斗註算君吏九人天靈官南斗上生君吏三人天靈官西斗記名君吏七人天靈官北斗落死君吏五人天靈官中斗大魁君吏十二人以上符篆並丹書正一眞人曰世間善男信女佩受太上正一延生保命籙尊奉敬禮仙曹眞吏營衛兆身名標金簡克作長生七祖超昇位登天人子其遵奉焉弟子某即日齎持質信恭詣天師門下拜受太上正一延生保命籙一階誓願修奉罔敢輕慢靈文倘或有違甘當㝠憲不敢怨道咎師一如玄科律令太上正一延生保命籙請籙法詞太上正一延生保命籙請法詞維某年月日某辰具貫隸某處居住奉道信士某詞稱本命某年月日時建生上屬北斗某星君注照即日謹齎法信叩頭恭詣龍虎山嗣漢天師眞人門下拜受太上正一延生保命籙一階伏以道與之貌百神默拱於泥丸天賦之形萬炁齊資於玉户養正則神明隂相惑邪則災害旁加度身威光命不待護而自護受天法籙神未嘗存而默存延福延齡消自戕之妖孽常清常靜保惟止之吉祥既覩慈光恭遵嚴戒某無任懇禱之至謹詞天師門下據弟子某齎持質信詣道自陳求受太上正一延生保命籙一階及請眞師寳諱終身敬奉今來所據投詞即日告盟天地立誓三官破券分環依科傳授給付如後籙一階太上正一延生保命籙儀式正一修眞㫖要節目祖玄眞三師玉諱祖師三天扶教輔元大法師正一沖玄神化靜應顯佑眞君張道陵玄師嗣師太清演教妙道眞君張衡眞師系師太清昭化廣德眞君張魯經籍度三師法諱經師上清三洞經籙南曹眞士玉府上𡖖都天大法主嗣漢四十二代天師張正常籍師上清三洞經籙太極執法眞宰靈寳領教眞人都天大法主嗣漢四十三代天師張宇初度師上清三洞寳籙靈寳領教玄化眞人南曹執法仙宰都天大法主嗣教四十四代天師張宇清臨壇師法名證盟師監度師保舉師天師正應先生曰玄聖格言天眞祕檢扶衰度厄當知三元華蓋之靈保命延生此謂五斗藏身之籙感孚孔易福利無邊故我太上設教流傳世學由是歷代眞師對敭寳訓汲引有縁繩繩不絶我以夙慶世戴國恩紹正一之師傳振天目之宗緒第法籙傳世寖遠乃選良匠鋟木成書以久其傳若夫禁戒守持惻隱慈悲從古至人莫不如是登壇善信各宜滌除玄覽積行累功庶幾有願皆符自此超凡入妙昭然盟載可不愼歟天師廣微子曰我家以太上符籙濟度人天保鎮國祚千有五百餘歲矣祖訓孔昭奚庸贅贊惟我先眞君際遇聖朝混一區宇首見尊崇江南冠褐咸隸管領予襲教以來三朝帝闕疊被恩光恭遇龍飛特頒涣號以精嚴比虚靖謂衹肅似沖和加官徵例於唐朝胙土進封於留國做好事傳符籙俾紹先猷祈福貺禦民災欽承聖訓祈天永命敢不衹勤度籙傳符益彰開化上以對敭天子丕顯之命下以敷錫庶民皇極之休尚克時忱以介景福正一玄壇保舉師上清三洞經籙某保舉到奉道信士某叅受太上正一延生保命籙皈身佩奉本壇除已具録事由躬請正一嗣教天師眞人申聞祖天師正一眞人依科傳度外爰給詞以爲證俾遵教以奉行倘負盟言自貽玄憲太上正一延生保命籙
